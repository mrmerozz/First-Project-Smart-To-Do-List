<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slate — To-Do</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <div class="page">

    <header class="header">
      <div class="header__brand">
        <span class="brand-mark"></span>
        <span class="brand-name">Slate</span>
      </div>
      <button class="theme-btn" id="themeToggle">
        <span class="theme-icon" id="themeIcon"></span>
        <span id="themeLabel">Dark</span>
      </button>
    </header>

    <section class="top">
      <p class="date" id="dateLabel"></p>
      <h1 class="greeting" id="greeting"></h1>

      <div class="progress-row">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <span class="progress-pct" id="progressText">0%</span>
      </div>

      <div class="stats">
        <div class="stat">
          <span class="stat__num" id="statTotal">0</span>
          <span class="stat__label">Total</span>
        </div>
        <div class="stat">
          <span class="stat__num stat__num--done" id="statDone">0</span>
          <span class="stat__label">Done</span>
        </div>
        <div class="stat">
          <span class="stat__num stat__num--left" id="statLeft">0</span>
          <span class="stat__label">Left</span>
        </div>
      </div>
    </section>

    <div class="input-card">
      <input
        type="text"
        id="taskInput"
        class="task-input"
        placeholder="Add a task..."
        autocomplete="off"
        maxlength="120"
      />
      <div class="input-footer">
        <div class="priority-group">
          <button class="priority-btn is-active" data-priority="normal">Normal</button>
          <button class="priority-btn" data-priority="urgent">Urgent</button>
          <button class="priority-btn" data-priority="chill">Chill</button>
        </div>
        <button id="addBtn" class="add-btn">
          <span class="add-icon"></span>
          Add
        </button>
      </div>
    </div>

    <ul class="task-list" id="taskList"></ul>

    <div class="empty" id="emptyState">
      <div class="empty__icon"></div>
      <p class="empty__text">No tasks yet.</p>
      <p class="empty__sub">Add something above to get started.</p>
    </div>

    <div class="reward" id="rewardBox"></div>

    <div class="actions">
      <button class="action-btn" id="clearDoneBtn">Clear done</button>
      <button class="action-btn action-btn--danger" id="clearAllBtn">Clear all</button>
    </div>

  </div>

  <script src="assets/js/script.js"></script>
</body>
</html>
